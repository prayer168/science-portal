<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自然科數位教材中心</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --g3:#FF6B6B; --g3-light:#fff0f0; --g3-soft:#ffe0e0;
    --g4:#FF9F43; --g4-light:#fff5e6; --g4-soft:#ffe8c0;
    --g5:#1DD1A1; --g5-light:#e6fdf7; --g5-soft:#b8f5e6;
    --g6:#54A0FF; --g6-light:#eaf3ff; --g6-soft:#c0d9ff;
    --fun:#A29BFE; --fun-light:#f2f0ff; --fun-soft:#d6d0ff;
    --app:#00B894; --app-light:#e6faf6; --app-soft:#b2edd8;
    --bg:#F8F9FF; --text:#2d3436; --text-sub:#636e72;
    --card-bg:#ffffff;
    --shadow:0 4px 24px rgba(0,0,0,0.07);
    --shadow-hover:0 10px 40px rgba(0,0,0,0.13);
    --radius:18px; --radius-sm:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* HEADER */
  header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:36px 24px 28px;text-align:center;position:relative;overflow:hidden;}
  header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
  .header-icon{font-size:48px;margin-bottom:8px;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.2));}
  header h1{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:clamp(22px,5vw,34px);font-weight:900;color:#fff;letter-spacing:2px;text-shadow:0 2px 12px rgba(0,0,0,0.18);position:relative;}
  header p{color:rgba(255,255,255,0.85);margin-top:6px;font-size:14px;position:relative;}

  /* HEADER RIGHT BUTTONS */
  .header-btns{position:absolute;top:16px;right:16px;display:flex;gap:8px;align-items:center;}
  .manage-toggle{background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);color:#fff;border-radius:50px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(4px);font-family:'Noto Sans TC',sans-serif;letter-spacing:0.5px;}
  .manage-toggle:hover{background:rgba(255,255,255,0.35);}
  .manage-toggle.active{background:#fff;color:#764ba2;}
  .btn-signout{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.9);border-radius:50px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;display:none;}
  .btn-signout:hover{background:rgba(255,255,255,0.3);}
  .user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.6);display:none;vertical-align:middle;}

  /* LOGIN OVERLAY */
  .login-overlay{position:fixed;inset:0;background:rgba(30,20,60,0.7);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;}
  .login-overlay.hidden{display:none;}
  .login-box{background:#fff;border-radius:24px;padding:40px 36px;text-align:center;max-width:360px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,0.25);animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
  .login-icon{font-size:52px;margin-bottom:12px;}
  .login-title{font-size:20px;font-weight:900;color:#2d3436;margin-bottom:6px;font-family:'Nunito',sans-serif;}
  .login-sub{font-size:13px;color:#636e72;margin-bottom:28px;line-height:1.6;}
  .btn-google-login{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;border:2px solid #e0e0e0;border-radius:14px;background:#fff;cursor:pointer;font-size:15px;font-weight:700;color:#333;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
  .btn-google-login:hover{background:#f8f8ff;border-color:#a29bfe;box-shadow:0 4px 16px rgba(102,126,234,0.2);transform:translateY(-1px);}
  .btn-google-login img{width:22px;height:22px;}
  .login-hint{margin-top:16px;font-size:11px;color:#b2bec3;}
  .login-error{margin-top:12px;font-size:13px;color:#ff6b6b;font-weight:600;min-height:20px;}
  .login-loading{margin-top:12px;font-size:13px;color:#a29bfe;display:none;}

  /* TABS - 顏色由 JS 動態注入 */
  .tab-bar{display:flex;gap:8px;padding:20px 16px 0;overflow-x:auto;justify-content:center;flex-wrap:wrap;max-width:960px;margin:0 auto;-webkit-overflow-scrolling:touch;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{font-family:'Nunito','Noto Sans TC',sans-serif;font-weight:800;font-size:15px;border:none;cursor:pointer;border-radius:50px;padding:10px 22px;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;background:#e0e0ee;color:#888;letter-spacing:0.5px;}
  .tab-btn .tab-count{display:inline-block;background:rgba(0,0,0,0.12);color:inherit;font-size:11px;border-radius:20px;padding:1px 7px;margin-left:5px;font-weight:700;vertical-align:middle;}
  .tab-btn.active{color:#fff;transform:translateY(-2px) scale(1.04);}
  .tab-btn:not(.active):hover{transform:translateY(-1px);}

  /* MANAGE PANEL */
  .manage-panel{display:none;max-width:960px;margin:0 auto;padding:20px 16px 0;}
  .manage-panel.open{display:block;animation:fadeUp 0.28s ease;}
  .panel-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;border:2px solid #e8e0ff;}
  .panel-title{font-size:16px;font-weight:800;color:#764ba2;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
  .add-form{display:grid;grid-template-columns:180px 1fr 2fr auto;gap:10px;align-items:end;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group label{font-size:12px;font-weight:700;color:var(--text-sub);letter-spacing:0.5px;}
  .form-group select,.form-group input{border:2px solid #e0e0ee;border-radius:10px;padding:9px 12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;background:#fafafa;width:100%;}
  .form-group select:focus,.form-group input:focus{border-color:#a29bfe;background:#fff;}
  .btn-add{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;white-space:nowrap;height:42px;align-self:end;}
  .btn-add:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(118,75,162,0.35);}
  .toast{display:inline-block;margin-left:12px;font-size:13px;font-weight:600;color:#1DD1A1;opacity:0;transition:opacity 0.3s;}
  .toast.show{opacity:1;}
  .manage-list-header{display:flex;align-items:center;justify-content:space-between;margin-top:22px;margin-bottom:10px;}
  .manage-list-title{font-size:14px;font-weight:700;color:var(--text-sub);}
  .manage-filter{border:2px solid #e0e0ee;border-radius:8px;padding:5px 10px;font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;color:var(--text);}
  .manage-filter:focus{border-color:#a29bfe;}
  .manage-table{width:100%;border-collapse:collapse;}
  .manage-table th{text-align:left;font-size:12px;font-weight:700;color:var(--text-sub);padding:8px 10px;border-bottom:2px solid #f0f0f8;letter-spacing:0.5px;}
  .manage-table td{padding:9px 10px;border-bottom:1px solid #f4f4f8;font-size:13px;vertical-align:middle;}
  .manage-table tr:last-child td{border-bottom:none;}
  .manage-table tr:hover td{background:#faf9ff;}
  .manage-table tr.row-checked td{background:#f5f0ff;}
  .manage-table th:first-child,.manage-table td:first-child{width:36px;padding-right:4px;}
  .row-cb{width:17px;height:17px;accent-color:#764ba2;cursor:pointer;vertical-align:middle;}
  .th-cb{width:17px;height:17px;accent-color:#764ba2;cursor:pointer;vertical-align:middle;}
  .cat-badge{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;}
  .td-name{font-weight:600;max-width:180px;}
  .td-url{color:var(--text-sub);font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .td-url a{color:#667eea;text-decoration:none;}
  .td-url a:hover{text-decoration:underline;}
  .btn-del{background:#fff0f0;color:#ff6b6b;border:2px solid #ffcdd2;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;font-family:'Noto Sans TC',sans-serif;}
  .btn-del:hover{background:#ff6b6b;color:#fff;border-color:#ff6b6b;}
  .btn-move{background:#f0f4ff;color:#667eea;border:2px solid #c5ceff;border-radius:8px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
  .btn-move:hover{background:#667eea;color:#fff;border-color:#667eea;}
  .move-select{border:2px solid #c5ceff;border-radius:8px;padding:3px 6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;outline:none;color:#333;background:#f8f8ff;cursor:pointer;max-width:100px;}
  .move-select:focus{border-color:#667eea;}
  .td-actions{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;}
  .batch-bar{display:none;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;padding:10px 14px;background:#fff5f5;border:2px solid #ffcdd2;border-radius:12px;}
  .batch-bar.show{display:flex;animation:fadeUp 0.2s ease;}
  .batch-count{font-size:13px;font-weight:700;color:#ff6b6b;}
  .btn-batch-del{background:#ff6b6b;color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.18s;}
  .btn-batch-del:hover{background:#e55555;transform:translateY(-1px);}
  .btn-batch-cancel{background:#fff;color:#888;border:2px solid #ddd;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.18s;}
  .btn-batch-cancel:hover{border-color:#aaa;color:#555;}
  .export-row{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn-export{background:#f0f0ff;color:#667eea;border:2px solid #c5c0ff;border-radius:10px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.18s;font-family:'Noto Sans TC',sans-serif;}
  .btn-export:hover{background:#667eea;color:#fff;border-color:#667eea;}
  .export-hint{font-size:11px;color:var(--text-sub);}

  /* CONTENT - 顏色由 JS 動態注入 */
  .content-area{max-width:960px;margin:0 auto;padding:20px 16px 48px;}
  .category-section{display:none;}
  .category-section.active{display:block;animation:fadeUp 0.32s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:16px 20px;border-radius:var(--radius);}
  .section-emoji{font-size:32px;}
  .section-title{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:20px;font-weight:900;letter-spacing:1px;}
  .section-subtitle{font-size:12px;opacity:0.7;margin-top:2px;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
  .card{background:var(--card-bg);border-radius:var(--radius-sm);padding:18px 16px;box-shadow:var(--shadow);cursor:pointer;text-decoration:none;color:var(--text);transition:all 0.22s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:flex-start;gap:10px;border:2px solid transparent;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;opacity:0;transition:opacity 0.2s;}
  .card:hover{transform:translateY(-5px) scale(1.02);box-shadow:var(--shadow-hover);}
  .card:hover::before{opacity:1;}
  .card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .card-name{font-size:14px;font-weight:700;line-height:1.5;color:var(--text);}
  .card-arrow{margin-top:auto;font-size:12px;font-weight:700;opacity:0.7;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-sub);font-size:14px;}
  .empty-state .empty-icon{font-size:40px;margin-bottom:10px;}

  /* CATEGORY MANAGEMENT */
  .cat-manage-box{margin-top:22px;padding-top:20px;border-top:2px dashed #e8e0ff;}
  .cat-manage-title{font-size:14px;font-weight:800;color:#764ba2;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .cat-add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .cat-input{border:2px solid #e0e0ee;border-radius:10px;padding:8px 12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;background:#fafafa;width:80px;}
  .cat-input:focus{border-color:#a29bfe;background:#fff;}
  .cat-input.wide{width:140px;}
  .btn-cat-add{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;white-space:nowrap;}
  .btn-cat-add:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(118,75,162,0.3);}
  .cat-list{display:flex;flex-wrap:wrap;gap:8px;}
  .cat-tag{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:50px;font-size:13px;font-weight:700;color:#fff;position:relative;}
  .cat-tag.locked{opacity:0.7;padding-right:12px;}
  .cat-tag-del{background:rgba(0,0,0,0.25);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-weight:900;transition:background 0.15s;padding:0;}
  .cat-tag-del:hover{background:rgba(0,0,0,0.5);}
  .cat-lock-hint{font-size:11px;color:#b2bec3;margin-top:8px;}

  footer{text-align:center;padding:24px;color:var(--text-sub);font-size:12px;border-top:1px solid #eee;}
  @media(max-width:640px){.add-form{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}.tab-btn{font-size:13px;padding:8px 16px;}.add-form{grid-template-columns:1fr;}.header-btns{top:10px;right:10px;gap:5px;}.manage-toggle{padding:6px 10px;font-size:12px;}}
</style>
</head>
<body>

<!-- Google 登入彈窗 -->
<div class="login-overlay hidden" id="loginOverlay">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">管理員登入</div>
    <div class="login-sub">此功能僅限授權帳號使用<br>請用指定的 Google 帳號登入</div>
    <button class="btn-google-login" id="btnGoogleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      使用 Google 帳號登入
    </button>
    <div class="login-error" id="loginError"></div>
    <div class="login-loading" id="loginLoading">⏳ 登入中，請稍候...</div>
    <div class="login-hint">僅 prayer168@gmail.com 可進入管理後台</div>
  </div>
</div>

<header>
  <span class="header-icon">🔬</span>
  <h1>自然科數位教材中心</h1>
  <p>點擊卡片即可開啟互動教材</p>
  <div class="header-btns">
    <img class="user-avatar" id="userAvatar" src="" alt="avatar">
    <button class="btn-signout" id="btnSignOut" onclick="signOut()">登出</button>
    <button class="manage-toggle" id="manageToggle" onclick="onManageClick()">⚙️ 管理教材</button>
  </div>
</header>

<nav class="tab-bar" id="tabBar"></nav>

<!-- 管理面板 -->
<div class="manage-panel" id="managePanel">
  <div class="panel-box">
    <div class="panel-title">➕ 新增教材</div>
    <div class="add-form">
      <div class="form-group">
        <label>年級 / 類別</label>
        <select id="addCat">
          <option value="三年級">🌱 三年級</option>
          <option value="四年級">🌿 四年級</option>
          <option value="五年級">🌲 五年級</option>
          <option value="六年級">🌏 六年級</option>
          <option value="教學應用">💡 教學應用</option>
          <option value="休閒（動動腦）">🎮 休閒（動動腦）</option>
        </select>
      </div>
      <div class="form-group">
        <label>教材名稱</label>
        <input type="text" id="addName" placeholder="例：光合作用模擬" />
      </div>
      <div class="form-group">
        <label>網址（https://...）</label>
        <input type="url" id="addUrl" placeholder="https://..." />
      </div>
      <button class="btn-add" onclick="addItem()">新增 ＋</button>
    </div>
    <span class="toast" id="toast">✅ 已新增！</span>

    <div class="manage-list-header">
      <div class="manage-list-title" id="listCount"></div>
      <select class="manage-filter" id="filterCat" onchange="renderManageTable()">
        <option value="">全部類別</option>
        <option value="三年級">三年級</option>
        <option value="四年級">四年級</option>
        <option value="五年級">五年級</option>
        <option value="六年級">六年級</option>
        <option value="教學應用">教學應用</option>
        <option value="休閒（動動腦）">休閒（動動腦）</option>
      </select>
    </div>

    <!-- 批次刪除/移動工具列 -->
    <div class="batch-bar" id="batchBar">
      <span class="batch-count" id="batchCount">已選 0 筆</span>
      <button class="btn-batch-del" onclick="batchDelete()">🗑️ 刪除所選</button>
      <select id="batchMoveCat" class="move-select" style="max-width:130px;padding:6px 8px;font-size:13px;"></select>
      <button class="btn-batch-del" style="background:#667eea;" onclick="batchMove()">📂 移動到此類別</button>
      <button class="btn-batch-cancel" onclick="clearSelection()">取消選取</button>
    </div>

    <div style="overflow-x:auto;">
      <table class="manage-table">
        <thead><tr>
          <th><input type="checkbox" class="th-cb" id="checkAll" onchange="toggleAll(this)" title="全選／取消全選"></th>
          <th>類別</th><th>名稱</th><th>網址</th><th>操作</th>
        </tr></thead>
        <tbody id="manageTableBody"></tbody>
      </table>
    </div>
    <div class="export-row">
      <button class="btn-export" onclick="exportData()">📋 匯出資料（複製）</button>
      <span class="export-hint">可備份教材清單，或傳給 Claude 匯入</span>
    </div>

    <!-- 類別管理 -->
    <div class="cat-manage-box">
      <div class="cat-manage-title">🗂️ 類別管理</div>
      <div class="cat-add-row">
        <input class="cat-input" id="catEmoji" placeholder="圖示" maxlength="2" title="輸入一個 emoji">
        <input class="cat-input wide" id="catName" placeholder="類別名稱" maxlength="20">
        <button class="btn-cat-add" onclick="addCategory()">新增類別 ＋</button>
      </div>
      <div class="cat-list" id="catList"></div>
      <div class="cat-lock-hint">🔒 預設類別無法刪除；自訂類別右側有 ✕ 可刪除（需先移除該類別內所有教材）</div>
    </div>
  </div>
</div>

<main class="content-area" id="contentArea"></main>
<footer>Prayer 老師的自然科數位教材 · 持續更新中 🌱</footer>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {

window.doGoogleLogin = async function() {
  const errEl = document.getElementById('loginError');
  const loadEl = document.getElementById('loginLoading');
  const btnEl  = document.getElementById('btnGoogleLogin');
  errEl.textContent = '';
  btnEl.style.display = 'none';
  loadEl.style.display = 'block';
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    if (user.email !== ALLOWED_EMAIL) {
      await fbSignOut(auth);
      loadEl.style.display = 'none';
      btnEl.style.display = 'flex';
      errEl.textContent = `❌ 此帳號 (${user.email}) 沒有管理權限`;
      return;
    }
    // 登入成功，關閉彈窗
    document.getElementById('loginOverlay').classList.add('hidden');
    loadEl.style.display = 'none';
    btnEl.style.display = 'flex';
  } catch(e) {
    loadEl.style.display = 'none';
    btnEl.style.display = 'flex';
    if (e.code !== 'auth/popup-closed-by-user') {
      errEl.textContent = '登入失敗，請再試一次';
    }
  }
};

// 登出

const DEFAULT_CATS = [
  {key:"三年級",  emoji:"🌱", desc:"三年級自然科互動教材", color:"#FF6B6B"},
  {key:"四年級",  emoji:"🌿", desc:"四年級自然科互動教材", color:"#FF9F43"},

];

// 自動指派顏色給新類別
const EXTRA_COLORS = ["#e17055","#6c5ce7","#fd79a8","#00cec9","#fdcb6e","#74b9ff","#55efc4","#fab1a0"];
let colorIdx = 0;

const CAT_STORE = 'science_portal_cats_v1';
function loadCats(){
  try{
    const s = localStorage.getItem(CAT_STORE);
    const extra = s ? JSON.parse(s) : [];
    return [...DEFAULT_CATS, ...extra];
  } catch { return [...DEFAULT_CATS]; }
}
function saveExtraCats(cats){
  const extra = cats.filter(c => !DEFAULT_CATS.find(d => d.key === c.key));
  localStorage.setItem(CAT_STORE, JSON.stringify(extra));
}

let CATS = loadCats();

function catColor(key){ return (CATS.find(c=>c.key===key)||{color:'#aaa'}).color; }
function catEmoji(key){ return (CATS.find(c=>c.key===key)||{emoji:'📌'}).emoji; }
function lighten(hex){
  // produce a very light tint from hex color
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.12)`;
}
function soften(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.22)`;
}

// ── 動態注入 tab / card 顏色 ──
function injectCatStyles(){
  let css = '';
  CATS.forEach(cat => {
    const c = cat.color, light = lighten(c), soft = soften(c);
    const k = CSS.escape(cat.key);
    css += `.tab-btn[data-cat="${cat.key}"]{background:${light};color:${c};}`;
    css += `.tab-btn[data-cat="${cat.key}"].active{background:${c};color:#fff;box-shadow:0 4px 18px ${light};}`;
    css += `[data-section="${cat.key}"] .section-header{background:${light};color:${c};}`;
    css += `[data-section="${cat.key}"] .section-title,[data-section="${cat.key}"] .section-subtitle{color:${c};}`;
    css += `[data-section="${cat.key}"] .card:hover{border-color:${c};}`;
    css += `[data-section="${cat.key}"] .card::before{background:${c};}`;
    css += `[data-section="${cat.key}"] .card-icon{background:${soft};}`;
    css += `[data-section="${cat.key}"] .card-arrow{color:${c};}`;
  });
  let el = document.getElementById('dynCatStyle');
  if(!el){ el=document.createElement('style'); el.id='dynCatStyle'; document.head.appendChild(el); }
  el.textContent = css;
}

// ── 新增/刪除類別 ──
function addCategory(){
  const emoji = document.getElementById('catEmoji').value.trim() || '📌';
  const name  = document.getElementById('catName').value.trim();
  if(!name){ alert('請輸入類別名稱'); return; }
  if(CATS.find(c=>c.key===name)){ alert('此類別名稱已存在'); return; }
  const color = EXTRA_COLORS[colorIdx % EXTRA_COLORS.length]; colorIdx++;
  CATS.push({ key:name, emoji, desc:name, color, custom:true });
  saveExtraCats(CATS);
  document.getElementById('catEmoji').value='';
  document.getElementById('catName').value='';
  injectCatStyles();
  syncCatSelects();
  buildPage();
  renderCatList();
}

function deleteCategory(key){
  const hasItems = DATA.some(d=>d.cat===key);
  if(hasItems){ alert(`請先刪除「${key}」類別內的所有教材，再刪除此類別。`); return; }
  if(!confirm(`確定刪除類別「${key}」？`)) return;
  CATS = CATS.filter(c=>c.key!==key);
  saveExtraCats(CATS);
  injectCatStyles();
  syncCatSelects();
  if(currentTab===key) currentTab=CATS[0].key;
  buildPage();
  renderCatList();
}

function renderCatList(){
  const el = document.getElementById('catList');
  if(!el) return;
  el.innerHTML = CATS.map(cat=>{
    const isDefault = DEFAULT_CATS.find(d=>d.key===cat.key);
    return `<span class="cat-tag${isDefault?' locked':''}" style="background:${cat.color}">
      ${cat.emoji} ${cat.key}
      ${!isDefault ? `<button class="cat-tag-del" onclick="deleteCategory('${cat.key.replace(/'/g,"\\'")}')">✕</button>` : ''}
    </span>`;
  }).join('');
}

// ── 同步所有下拉選單 ──
function syncCatSelects(){
  const opts = CATS.map(c=>`<option value="${c.key}">${c.emoji} ${c.key}</option>`).join('');
  const filterOpts = `<option value="">全部類別</option>` + CATS.map(c=>`<option value="${c.key}">${c.key}</option>`).join('');
  const batchOpts = `<option value="">移動到…</option>` + CATS.map(c=>`<option value="${c.key}">${c.emoji} ${c.key}</option>`).join('');
  const addCatEl = document.getElementById('addCat');
  const filterEl = document.getElementById('filterCat');
  const batchEl  = document.getElementById('batchMoveCat');
  if(addCatEl) addCatEl.innerHTML = opts;
  if(filterEl) filterEl.innerHTML = filterOpts;
  if(batchEl)  batchEl.innerHTML  = batchOpts;
}

// ── 單筆移動 ──
function moveItem(idx, newCat){
  if(!newCat) return;
  const item = DATA[idx];
  const oldCat = item.cat;
  item.cat = newCat;
  item.icon = catEmoji(newCat);
  saveData(DATA);
  buildPage();
  renderManageTable();
  // 顯示提示
  const toast = document.getElementById('toast');
  toast.textContent = `✅ 已移至「${newCat}」`;
  toast.classList.add('show');
  setTimeout(()=>{ toast.classList.remove('show'); toast.textContent='✅ 已新增！'; }, 2000);
}

// ── 批次移動 ──
function batchMove(){
  const indices = getCheckedIndices();
  const newCat  = document.getElementById('batchMoveCat').value;
  if(indices.length===0){ alert('請先勾選要移動的教材'); return; }
  if(!newCat){ alert('請選擇要移動到的類別'); return; }
  const names = indices.map(i=>DATA[i].name);
  const preview = names.length<=5 ? names.join('、') : names.slice(0,5).join('、')+`…等 ${names.length} 筆`;
  if(!confirm(`確定將以下 ${indices.length} 筆教材移到「${newCat}」？\n\n${preview}`)) return;
  indices.forEach(i=>{ DATA[i].cat=newCat; DATA[i].icon=catEmoji(newCat); });
  saveData(DATA);
  buildPage();
  clearSelection();
  renderManageTable();
}

const STORE_KEY='science_portal_v1';
function loadData(){
  try{const s=localStorage.getItem(STORE_KEY);return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_DATA));}
  catch{return JSON.parse(JSON.stringify(DEFAULT_DATA));}
}
function saveData(d){localStorage.setItem(STORE_KEY,JSON.stringify(d));}

let DATA=loadData();
let currentTab=CATS[0].key;
let manageOpen=false;

const tabBar=document.getElementById('tabBar');
const contentArea=document.getElementById('contentArea');

function buildPage(){
  tabBar.innerHTML='';
  contentArea.innerHTML='';
  injectCatStyles();
  CATS.forEach((cat)=>{
    const items=DATA.filter(d=>d.cat===cat.key);
    const btn=document.createElement('button');
    btn.className='tab-btn'+(cat.key===currentTab?' active':'');
    btn.dataset.cat=cat.key;
    btn.innerHTML=`${cat.emoji} ${cat.key} <span class="tab-count">${items.length}</span>`;
    btn.addEventListener('click',()=>switchTab(cat.key));
    tabBar.appendChild(btn);
    const section=document.createElement('section');
    section.className='category-section'+(cat.key===currentTab?' active':'');
    section.dataset.section=cat.key;
    const cardsHtml=items.length===0
      ?`<div class="empty-state"><div class="empty-icon">📭</div>尚無教材，請點右上角「管理教材」新增</div>`
      :items.map(item=>`
        <a class="card" href="${item.url}" target="_blank" rel="noopener">
          <div class="card-icon">${item.icon}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-arrow">開啟 →</div>
        </a>`).join('');
    section.innerHTML=`
      <div class="section-header">
        <span class="section-emoji">${cat.emoji}</span>
        <div>
          <div class="section-title">${cat.key}</div>
          <div class="section-subtitle">${cat.desc} · ${items.length} 個教材</div>
        </div>
      </div>
      <div class="card-grid">${cardsHtml}</div>`;
    contentArea.appendChild(section);
  });
}

function switchTab(catKey){
  currentTab=catKey;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===catKey));
  document.querySelectorAll('.category-section').forEach(s=>s.classList.toggle('active',s.dataset.section===catKey));
}

// ── 管理面板：需登入才能開 ──
function onManageClick(){
  if(window._isAdmin){
    toggleManagePanel();
  } else {
    // 未登入：顯示登入彈窗，登入後自動開管理
    window._pendingManage = true;
    document.getElementById('loginOverlay').classList.remove('hidden');
  }
}

function openManagePanel(){
  manageOpen=true;
  document.getElementById('managePanel').classList.add('open');
  const btn=document.getElementById('manageToggle');
  btn.classList.add('active');
  btn.textContent='✕ 關閉管理';
  syncCatSelects();
  renderManageTable();
  renderCatList();
}

function closeManagePanel(){
  manageOpen=false;
  document.getElementById('managePanel').classList.remove('open');
  const btn=document.getElementById('manageToggle');
  btn.classList.remove('active');
  btn.textContent='⚙️ 管理教材';
}

function toggleManagePanel(){
  manageOpen ? closeManagePanel() : openManagePanel();
}

// ── 管理表格 ──
let filteredIndices=[];

function renderManageTable(){
  const filter=document.getElementById('filterCat').value;
  const filtered=DATA.map((item,i)=>({item,i})).filter(({item})=>!filter||item.cat===filter);
  filteredIndices=filtered.map(f=>f.i);
  document.getElementById('listCount').textContent=`共 ${filtered.length} 筆（全部 ${DATA.length} 筆）`;
  const tbody=document.getElementById('manageTableBody');
  if(filtered.length===0){
    tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:24px;color:#999;">此類別尚無教材</td></tr>`;
    updateBatchBar();return;
  }
  tbody.innerHTML=filtered.map(({item,i})=>{
    const color=catColor(item.cat);
    const moveOpts=CATS.filter(c=>c.key!==item.cat).map(c=>`<option value="${c.key}">${c.emoji} ${c.key}</option>`).join('');
    return`<tr data-idx="${i}">
      <td><input type="checkbox" class="row-cb" data-idx="${i}" onchange="onRowCheck()"></td>
      <td><span class="cat-badge" style="background:${color}">${item.cat}</span></td>
      <td class="td-name">${item.icon} ${item.name}</td>
      <td class="td-url"><a href="${item.url}" target="_blank" rel="noopener">${item.url}</a></td>
      <td><div class="td-actions">
        <select class="move-select" id="movesel-${i}" onchange="moveItem(${i},this.value)" title="移動到其他類別">
          <option value="">📂 移到…</option>
          ${moveOpts}
        </select>
        <button class="btn-del" onclick="deleteItem(${i})">刪除</button>
      </div></td>
    </tr>`;
  }).join('');
  updateBatchBar();
  syncCheckAll();
}

function onRowCheck(){
  const row=event.target.closest('tr');
  row.classList.toggle('row-checked',event.target.checked);
  updateBatchBar();syncCheckAll();
}
function toggleAll(masterCb){
  document.querySelectorAll('.row-cb').forEach(cb=>{
    cb.checked=masterCb.checked;
    cb.closest('tr').classList.toggle('row-checked',masterCb.checked);
  });
  updateBatchBar();
}
function syncCheckAll(){
  const cbs=[...document.querySelectorAll('.row-cb')];
  const allCb=document.getElementById('checkAll');
  if(!allCb||cbs.length===0){if(allCb)allCb.checked=false;return;}
  const n=cbs.filter(c=>c.checked).length;
  allCb.checked=n===cbs.length;
  allCb.indeterminate=n>0&&n<cbs.length;
}
function getCheckedIndices(){
  return[...document.querySelectorAll('.row-cb:checked')].map(cb=>parseInt(cb.dataset.idx));
}
function updateBatchBar(){
  const checked=getCheckedIndices();
  document.getElementById('batchBar').classList.toggle('show',checked.length>0);
  document.getElementById('batchCount').textContent=`已選 ${checked.length} 筆`;
}
function clearSelection(){
  document.querySelectorAll('.row-cb').forEach(cb=>{cb.checked=false;cb.closest('tr').classList.remove('row-checked');});
  const allCb=document.getElementById('checkAll');
  if(allCb){allCb.checked=false;allCb.indeterminate=false;}
  updateBatchBar();
}
function batchDelete(){
  const indices=getCheckedIndices();
  if(indices.length===0)return;
  const names=indices.map(i=>DATA[i].name);
  const preview=names.length<=5?names.join('、'):names.slice(0,5).join('、')+`…等 ${names.length} 筆`;
  if(!confirm(`確定刪除以下 ${indices.length} 筆教材？\n\n${preview}`))return;
  indices.sort((a,b)=>b-a).forEach(i=>DATA.splice(i,1));
  saveData(DATA);buildPage();renderManageTable();
}

function addItem(){
  const cat=document.getElementById('addCat').value.trim();
  const name=document.getElementById('addName').value.trim();
  const url=document.getElementById('addUrl').value.trim();
  if(!name){alert('請輸入教材名稱');return;}
  if(!url){alert('請輸入網址');return;}
  if(!url.startsWith('http')){alert('網址需以 http 或 https 開頭');return;}
  DATA.push({cat,name,url,icon:catEmoji(cat)});
  saveData(DATA);
  document.getElementById('addName').value='';
  document.getElementById('addUrl').value='';
  buildPage();renderManageTable();switchTab(cat);
  const toast=document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}
function deleteItem(idx){
  const item=DATA[idx];
  if(!confirm(`確定刪除「${item.name}」？`))return;
  DATA.splice(idx,1);saveData(DATA);buildPage();renderManageTable();
}
function exportData(){
  const text=JSON.stringify(DATA,null,2);
  navigator.clipboard.writeText(text).then(()=>{
    alert('✅ 已複製到剪貼板！共 '+DATA.length+' 筆教材資料。');
  }).catch(()=>{prompt('請手動複製以下資料：',text);});
}

document.getElementById('addUrl').addEventListener('keydown',e=>{if(e.key==='Enter')addItem();});
document.getElementById('addName').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addUrl').focus();});
document.getElementById('catName').addEventListener('keydown',e=>{if(e.key==='Enter')addCategory();});

injectCatStyles();
syncCatSelects();
buildPage();
</script>
</body>
</html>
